# trading-system/docker-compose.yml
#
# Local infrastructure: PostgreSQL (hot DB) + Redis (cache).
# GCP services (BigQuery, Pub/Sub, etc.) are NOT run locally.
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose ps             # Check status
#   docker-compose logs postgres  # View PostgreSQL logs
#   docker-compose down           # Stop (keeps volumes)
#   docker-compose down -v        # Stop + DELETE all data

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: quantai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       quantai
      POSTGRES_USER:     quantai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantai -d quantai"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: quantai-redis
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --appendfsync everysec
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
